  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

6vw}\n  .waitlist-box{padding:1.75rem}\n  .barra{gap:.75rem 1rem}\n  .barra p{font-size:.92rem}\n  footer{flex-direction:column;align-items:flex-start;gap:1.25rem}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<nav>\n  <a href=\"#\" class=\"nav-logo\">The Andy Lab<\u002Fa>\n  <ul class=\"nav-links\">\n    <li><a href=\"#brain\">Andy<\u002Fa><\u002Fli>\n    <li><a href=\"#oferta\">THE Lab<\u002Fa><\u002Fli>\n    <li><a href=\"#newsletter\">Newsletter<\u002Fa><\u002Fli>\n  <\u002Ful>\n  <a href=\"#lab-full\" class=\"btn-nav\">Lista de espera<\u002Fa>\n<\u002Fnav>\n\n<section class=\"hero\">\n  <div class=\"hero-wm\">FUERTE<\u002Fdiv>\n  <div class=\"hero-tag\">The Andy Lab — Madrid<\u002Fdiv>\n  <h1>Tienes<br>miedo<br>de ser<br>fuerte.<\u002Fh1>\n  <p class=\"hero-sub\">Crees que el músculo te va a hacer parecer un hombre. Entonces haces cardio. Levantas pesos que no inspiran a nadie. Sigues mil cuentas. Guardas los videos. Y no pasa nada.<br><br>Todo ese tiempo invertido, y sigues dando vueltas en círculo.<\u002Fp>\n  <div class=\"hero-ctas\">\n    <a href=\"#oferta\" class=\"btn-p\">Entrar al Lab<\u002Fa>\n    <a href=\"#newsletter\" class=\"btn-f\">Leer la newsletter<\u002Fa>\n  <\u002Fdiv>\n  <div class=\"scroll-hint\">Scroll<\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"ticker-wrap\">\n  <div class=\"ticker-track\">\n    <span class=\"ac\">Las mujeres no somos frágiles<\u002Fspan><span>—<\u002Fspan>\n    <span>Evidencia. No motivación.<\u002Fspan><span>—<\u002Fspan>\n    <span class=\"ac\">Más músculo. Menos culpa. Más espacio.<\u002Fspan><span>—<\u002Fspan>\n    <span>No una transformación. Un estándar.<\u002Fspan><span>—<\u002Fspan>\n    <span class=\"ac\">Las mujeres no somos frágiles<\u002Fspan><span>—<\u002Fspan>\n    <span>Evidencia. No motivación.<\u002Fspan><span>—<\u002Fspan>\n    <span class=\"ac\">Más músculo. Menos culpa. Más espacio.<\u002Fspan><span>—<\u002Fspan>\n    <span>No una transformación. Un estándar.<\u002Fspan><span>—<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<section class=\"shift\">\n  <div class=\"shift-inner\">\n    <span class=\"etiq-osc\">The Shift<\u002Fspan>\n    <h2>Las mujeres<br>fuertes no<br>se construyen<br>a punta de<br>culpa y miedo.<\u002Fh2>\n    <div class=\"shift-body\">\n      <p>Se construyen cuando dejas de tenerle miedo a ser fuerte. Cuando entras al gym y sabes exactamente qué estás haciendo y por qué. Cuando comes sin negociar contigo misma.<\u002Fp>\n      <p>Cuando tu cuerpo deja de ser algo que controlar y empieza a ser algo que construir.<\u002Fp>\n      <p><strong>Eso no te lo va a dar una app. Ni un plan de doce semanas. Ni seguir mil cuentas más.<\u002Fstrong><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"brain\" id=\"brain\">\n  <div class=\"brain-foto\">\n    <img src=\"45df2579-fbeb-475f-bf1d-6cf2e96aef41\" alt=\"Andy\">\n  <\u002Fdiv>\n  <div class=\"brain-txt\">\n    <span class=\"etiq\">The Brain<\u002Fspan>\n    <div class=\"brain-name\">AN<span>DY.<\u002Fspan><\u002Fdiv>\n    <p>Economista. Colombiana, de Cali — importante que sepas que bailo bien. Con paradas en varios países antes de llegar a Madrid.<\u002Fp>\n    <p>No soy entrenadora personal. No soy nutricionista. Soy alguien con una obsesión muy específica: entender por qué las personas no hacen lo que saben que deberían hacer. Eso me llevó de la economía a la salud pública global. Tres continentes. El mismo patrón en todos lados.<\u002Fp>\n    <p>En algún punto entre todo eso y una década levantando pesas, construí The Andy Lab. Mi filosofía, mi forma de leer un problema, mi negativa a venderte lo que la industria quiere que compres. Mi forma de entender y aplicar la nutrición y el entrenamiento de fuerza para crear un cuerpo que haga lo que le pides.<\u002Fp>\n    <p><strong>Ese es el producto. Yo soy el producto.<\u002Fstrong><\u002Fp>\n    <p>Ese cerebro, con un punto de vista muy específico y poca paciencia para el nonsense, es lo que obtienes cuando entras al Lab.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"barra\">\n  <p>THE Gym<\u002Fp><span>·<\u002Fspan><p>THE Food<\u002Fp><span>·<\u002Fspan><p>THE Life<\u002Fp><span>·<\u002Fspan><p>THE Lab<\u002Fp>\n<\u002Fdiv>\n\n<section class=\"oferta\" id=\"oferta\">\n  <div class=\"oferta-hdr\">\n    <span class=\"etiq\">Entra al Lab<\u002Fspan>\n    <h2>Elige tu<br>punto de<br>entrada.<\u002Fh2>\n  <\u002Fdiv>\n  <div class=\"oferta-grid\" id=\"newsletter\">\n    <div class=\"ocard\">\n      <span class=\"onivel\">THE First Step — Gratis<\u002Fspan>\n      <h3>THE<br>Newsletter<\u002Fh3>\n      <p>Una newsletter semanal donde pienso en voz alta sobre entrenamiento, nutrición y por qué tu cuerpo hace lo que hace. Sin motivación. Sin historias de transformación.<\u002Fp>\n      <ul>\n        <li>[THE] Gym. Cómo construir músculo sin inventarte un programa nuevo cada semana.<\u002Fli>\n        <li>[THE] Food. Comer sin culpa. Sin dietas. Sin alimentos prohibidos.<\u002Fli>\n        <li>[THE] Life. Por qué no haces lo que sabes que deberías — y cómo arreglarlo.<\u002Fli>\n        <li>[THE] Lab. La evidencia más reciente, sin interés en venderte nada.<\u002Fli>\n      <\u002Ful>\n      <a href=\"https://theandylab.substack.com\" target=\"_blank\" rel=\"noopener\" class=\"olink\">Suscribirse →<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"ocard\">\n      <span class=\"onivel\">THE Work<\u002Fspan>\n      <h3>THE<br>Shop<\u002Fh3>\n      <p>Programas de entrenamiento y guías de nutrición construidos sobre la misma ciencia y metodología que todo lo demás aquí. Para las que quieren ir más lejos solas antes de dar el siguiente paso.<\u002Fp>\n      <p style=\"font-style:italic;color:var(--b25);font-size:.8rem;margin-top:auto\">Si estás leyendo esto antes del lanzamiento, eso ya dice algo.<\u002Fp>\n      <a href=\"https://tally.so/r/44GV7Y\" target=\"_blank\" rel=\"noopener\" class=\"olink\">Apúntate a la lista →<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"ocard dest\">\n      <span class=\"onivel\">THE Lab — 200€/mes<\u002Fspan>\n      <h3>THE<br>Lab<br>1:1<\u002Fh3>\n      <div class=\"oprecio\"><strong>200€/mes.<\u002Fstrong> Ciclos de 13 semanas. Plazas limitadas.<\u002Fdiv>\n      <p>Un cambio radical en la relación con tu cuerpo, con el músculo al centro. Un sistema construido específicamente para ti — ajustado semana a semana según cómo responde tu cuerpo.<\u002Fp>\n      <ul>\n        <li>Entrenamiento y nutrición 100% personalizados.<\u002Fli>\n        <li>Corrección de técnica en video.<\u002Fli>\n        <li>Videollamada cada cuatro semanas.<\u002Fli>\n        <li>Plataforma privada. Mi cerebro analizándote.<\u002Fli>\n      <\u002Ful>\n      <a href=\"#lab-full\" class=\"olink\">Ver cómo funciona →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"lab-full\" id=\"lab-full\">\n  <div class=\"lab-full-inner\">\n    <div class=\"lab-full-izq\">\n      <span class=\"etiq\">THE Lab 1:1<\u002Fspan>\n      <h2>Cómo<br>funciona.<\u002Fh2>\n      <div class=\"precio-grande\">200€/mes<\u002Fdiv>\n      <div class=\"precio-detalle\">Ciclos de 13 semanas.<br>Plazas limitadas.<br>Hay lista de espera.<\u002Fdiv>\n      <div class=\"waitlist-box\">\n        <p>Las plazas son limitadas porque tienen que serlo. Esto funciona porque le dedico tiempo real a cada persona — y el tiempo no escala.<\u002Fp>\n        <p>Si estás lista, apúntate. Te contacto cuando haya un hueco.<\u002Fp>\n        <a href=\"https://tally.so/r/XxNP4Y\" target=\"_blank\" rel=\"noopener\" class=\"btn-p\" style=\"text-align:center\">Apúntate a la lista de espera →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"lab-full-der\">\n\n      <div class=\"bloque\">\n        <div class=\"bloque-titulo\">THE Client — Who Is It For<\u002Fdiv>\n        <p class=\"dest\">Tienes 32 años, energía de sobra y sin excusas. O tienes 38, dos hijos y seis horas de sueño interrumpido. O tienes 45 y te preguntas por qué todo se siente diferente de repente.<\u002Fp>\n        <p>Los requerimientos de tu cuerpo cambian — hormonal, metabólica, estructuralmente. La mayoría de los programas ignoran esto. Te dan el mismo mapa sin importar dónde estás.<\u002Fp>\n        <p><strong>Yo no.<\u002Fstrong><\u002Fp>\n        <p>Antes de construir cualquier cosa, necesito saber quién eres. No tu peso objetivo. Tu relación con la comida, la historia detrás, la culpa alrededor, las reglas que sigues sin saber por qué. Cómo duermes. Cómo es tu vida real un martes. Lo que te encanta comer. Cómo ha sido el entrenamiento antes. Qué se interpuso en el camino.<\u002Fp>\n        <p>Ahí es donde empezamos. El sistema que construyo para ti es tan bueno como mi entendimiento de ti.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"bloque\">\n        <div class=\"bloque-titulo\">THE Gym<\u002Fdiv>\n        <p>Te construyo un programa. Tuyo. No una plantilla con tu nombre encima.<\u002Fp>\n        <p>Cada músculo, cada semana, cada bloque — con suficiente estímulo para crecer y suficiente recuperación para no romperte. Esa línea es más fina de lo que parece, y la mayoría de los programas genéricos ni la buscan.<\u002Fp>\n        <p>El programa es repetitivo a propósito. El cuerpo se vuelve más fuerte haciendo lo mismo mejor — no haciendo cosas nuevas cada semana. Lo que cambia es la exigencia. Más peso, más series, más control. El progreso no tiene cara de novedad. Tiene cara de 5 kilos más en la barra.<\u002Fp>\n        <p>Y si algo no se ve bien en tu técnica, me mandas el video. Te digo exactamente qué está pasando — antes de que ese error se convierta en lesión o en años levantando sin llegar a ningún lado.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"bloque\">\n        <div class=\"bloque-titulo\">THE Food<\u002Fdiv>\n        <p>El músculo no solo se construye en el gym. Se construye en la mesa.<\u002Fp>\n        <p>La síntesis proteica — el proceso por el que tu cuerpo construye músculo nuevo — necesita materia prima. Más de la que comes.<\u002Fp>\n        <p>No te voy a dar una dieta. Te voy a dar un marco, ajustado a lo que comes, a lo que te gusta, a cómo vives.<\u002Fp>\n        <p>Ningún alimento está prohibido. Ningún día es un fracaso.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"bloque\">\n        <div class=\"bloque-titulo\">THE Calls<\u002Fdiv>\n        <p>Cada cuatro semanas, tú y yo en videollamada. 30 a 45 minutos para revisar dónde estás, qué está funcionando y qué cambia. Tu cuerpo en la semana uno no es el mismo que en la semana ocho. El plan tampoco debería serlo.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"bloque\">\n        <div class=\"bloque-titulo\">THE Platform<\u002Fdiv>\n        <p>Todo vive en una plataforma privada construida para ti. Tu programa, tu nutrición, tu progreso — en un solo lugar, retroalimentándose.<\u002Fp>\n        <p>No puedes descargarla. No está en el mercado. No existe para nadie que no trabaje conmigo.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"bloque\">\n        <div class=\"bloque-titulo\">THE Investment<\u002Fdiv>\n        <ul class=\"inversion-lista\">\n          <li>Un programa de entrenamiento tuyo.<\u002Fli>\n          <li>Nutrición que funciona con tu vida.<\u002Fli>\n          <li>Corrección de técnica en video.<\u002Fli>\n          <li>Una llamada cada cuatro semanas.<\u002Fli>\n          <li>Una plataforma donde vive todo.<\u002Fli>\n        <\u002Ful>\n        <div class=\"precio-final\">200€/mes<\u002Fdiv>\n        <p>Probablemente menos de lo que llevas gastando en cosas que no te están llevando a ningún lado.<\u002Fp>\n        <p>Las plazas son limitadas porque tienen que serlo. Hay lista de espera. Si estás lista, apúntate.<\u002Fp>\n        <a href=\"https://tally.so/r/XxNP4Y\" target=\"_blank\" rel=\"noopener\" class=\"btn-p\" style=\"margin-top:1rem;display:inline-block\">Apúntate a la lista de espera →<\u002Fa>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"app-s\">\n  <div class=\"app-hdr\">\n    <span class=\"etiq\">THE Platform<\u002Fspan>\n    <h2>No se descarga.<br>No se compra.<\u002Fh2>\n    <p>La plataforma privada donde trabajo contigo. Tu entrenamiento, tu progreso, tus datos — todo en un lugar, retroalimentándose. No existe para que te sientas motivada. Existe para que yo tenga todo lo que necesito para que el sistema funcione.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"app-mocks\">\n    <div class=\"pframe\">\n      <div class=\"pnotch\"><\u002Fdiv>\n      <div class=\"pscreen\">\n        <div class=\"shdr\"><span class=\"stitle\">Semana 4 · Día 2<\u002Fspan><span class=\"stag\">Upper A<\u002Fspan><\u002Fdiv>\n        <div class=\"snav\"><div class=\"sday\">L<\u002Fdiv><div class=\"sday\">M<\u002Fdiv><div class=\"sday on\">X<\u002Fdiv><div class=\"sday\">J<\u002Fdiv><div class=\"sday\">V<\u002Fdiv><\u002Fdiv>\n        <div class=\"ecard hi\"><div><div class=\"enom\">Press banca<\u002Fdiv><div class=\"eset\">4 × 6–8 · 52.5 kg<\u002Fdiv><\u002Fdiv><div class=\"echk done\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"ecard hi\"><div><div class=\"enom\">Remo con barra<\u002Fdiv><div class=\"eset\">4 × 8–10 · 45 kg<\u002Fdiv><\u002Fdiv><div class=\"echk done\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"ecard\"><div><div class=\"enom\">Press militar<\u002Fdiv><div class=\"eset\">3 × 8–10 · 30 kg<\u002Fdiv><\u002Fdiv><div class=\"echk\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"ecard\"><div><div class=\"enom\">Curl bíceps<\u002Fdiv><div class=\"eset\">3 × 10–12 · 14 kg<\u002Fdiv><\u002Fdiv><div class=\"echk\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"pbwrap\"><div class=\"pblbl\"><span>Progreso sesión<\u002Fspan><span>2 / 4<\u002Fspan><\u002Fdiv><div class=\"pbar\"><div class=\"pfill\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pframe tall\">\n      <div class=\"pnotch\"><\u002Fdiv>\n      <div class=\"pscreen nut\">\n        <div class=\"shdr\"><span class=\"stitle\">Hoy<\u002Fspan><span class=\"stag\">Día de entreno<\u002Fspan><\u002Fdiv>\n        <div class=\"mring-w\">\n          <div class=\"mring\">\n            <svg viewBox=\"0 0 90 90\">\n              <circle cx=\"45\" cy=\"45\" r=\"38\" fill=\"none\" stroke=\"rgba(250,249,246,0.06)\" stroke-width=\"6\"><\u002Fcircle>\n              <circle cx=\"45\" cy=\"45\" r=\"38\" fill=\"none\" stroke=\"#4a0101\" stroke-width=\"6\" stroke-dasharray=\"174 239\" stroke-linecap=\"round\"><\u002Fcircle>\n            <\u002Fsvg>\n            <div class=\"mring-lbl\"><div class=\"mring-n\">1.840<\u002Fdiv><div class=\"mring-s\">kcal<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"mgrid\">\n          <div class=\"mitem\"><div class=\"mval\">142g<\u002Fdiv><div class=\"mnom\">Proteína<\u002Fdiv><\u002Fdiv>\n          <div class=\"mitem\"><div class=\"mval\">195g<\u002Fdiv><div class=\"mnom\">Carbos<\u002Fdiv><\u002Fdiv>\n          <div class=\"mitem\"><div class=\"mval\">58g<\u002Fdiv><div class=\"mnom\">Grasas<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"citem\"><span class=\"cnom\">Desayuno<\u002Fspan><span class=\"cprot\">38g prot<\u002Fspan><\u002Fdiv>\n        <div class=\"citem\"><span class=\"cnom\">Almuerzo<\u002Fspan><span class=\"cprot\">52g prot<\u002Fspan><\u002Fdiv>\n        <div class=\"citem\" style=\"border-bottom:none\"><span class=\"cnom\">Cena<\u002Fspan><span style=\"font-size:.62rem;color:var(--b25)\">pendiente<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pframe\">\n      <div class=\"pnotch\"><\u002Fdiv>\n      <div class=\"pscreen\">\n        <div class=\"shdr\"><span class=\"stitle\">Progreso<\u002Fspan><span class=\"stag\">Semana 4<\u002Fspan><\u002Fdiv>\n        <div class=\"srow\">\n          <div class=\"sbox\"><div class=\"snum\">+4.2<span style=\"font-size:.8rem;color:var(--b50)\">kg<\u002Fspan><\u002Fdiv><div class=\"sdsc\">vs semana 1<\u002Fdiv><\u002Fdiv>\n          <div class=\"sbox\"><div class=\"snum\">11<span style=\"font-size:.8rem;color:var(--b25)\">/13<\u002Fspan><\u002Fdiv><div class=\"sdsc\">sesiones<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--b25);margin-bottom:.6rem\">Volumen — Press banca<\u002Fdiv>\n        <div class=\"cbars\">\n          <div class=\"cbar\" style=\"height:35%\"><\u002Fdiv><div class=\"cbar\" style=\"height:45%\"><\u002Fdiv>\n          <div class=\"cbar\" style=\"height:52%\"><\u002Fdiv><div class=\"cbar hi\" style=\"height:72%\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"clbls\"><span class=\"clbl\">S1<\u002Fspan><span class=\"clbl\">S2<\u002Fspan><span class=\"clbl\">S3<\u002Fspan><span class=\"clbl\" style=\"color:var(--b50)\">S4<\u002Fspan><\u002Fdiv>\n        <div class=\"nota\">\n          <div class=\"nlbl\">Nota de Andy<\u002Fdiv>\n          <div class=\"ntxt\">\"Buen progreso en press. La semana que viene subimos a 55 kg. El volumen en espalda sigue bajo — añado una serie en remo.\"<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"cta-f\" id=\"cta\">\n  <span class=\"etiq\" style=\"display:block;margin-bottom:2.5rem\">THE Promise<\u002Fspan>\n  <h2>Si llegaste<br>hasta aquí,<br>ya sabes.<\u002Fh2>\n  <p>Terminaste con los programas que no fueron construidos para ti. El primer paso es apuntarte — te contacto cuando haya un hueco.<\u002Fp>\n  <a href=\"#lab-full\" class=\"btn-p\">Apúntate a la lista de espera<\u002Fa>\n<\u002Fsection>\n\n<footer>\n  <a href=\"#\" class=\"flogo\">The Andy Lab<\u002Fa>\n  <ul class=\"flinks\">\n    <li><a href=\"#\">Newsletter<\u002Fa><\u002Fli>\n    <li><a href=\"#lab-full\">THE Lab 1:1<\u002Fa><\u002Fli>\n    <li><a href=\"#\">Instagram<\u002Fa><\u002Fli>\n  <\u002Ful>\n  <span class=\"fcopy\">© 2026 The Andy Lab<\u002Fspan>\n<\u002Ffooter>\n\n\n<script>\n(function(){\n  var nav=document.querySelector('nav');\n  var onScroll=function(){ if(nav) nav.classList.toggle('scrolled', window.scrollY>40); };\n  onScroll(); window.addEventListener('scroll',onScroll,{passive:true});\n\n  var sel=['.shift-inner','.brain-txt','.brain-foto','.oferta-hdr','.ocard','.bloque','.app-hdr','.pframe','.lab-full-izq','.cta-f h2','.cta-f p'];\n  var nodes=[];\n  sel.forEach(function(s){ document.querySelectorAll(s).forEach(function(el){ el.classList.add('reveal'); nodes.push(el); }); });\n\n  // stagger siblings within their parent for grids\n  ['.oferta-grid','.app-mocks'].forEach(function(p){\n    var parent=document.querySelector(p); if(!parent) return;\n    Array.prototype.slice.call(parent.children).forEach(function(c,i){\n      if(c.classList.contains('reveal')) c.style.transitionDelay=(i*0.1)+'s';\n    });\n  });\n\n  if(!('IntersectionObserver' in window)){ nodes.forEach(function(n){n.classList.add('in');}); return; }\n  var io=new IntersectionObserver(function(entries){\n    entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });\n  },{threshold:0.12,rootMargin:'0px 0px -8% 0px'});\n  nodes.forEach(function(n){ io.observe(n); });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
